<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrapbook Memories</title>
    <style>
        /* সম্পূর্ণ নতুন কালার প্যালেট: কফি এবং পুরনো কাগজ */
        :root {
            --bg-color: #1a1a1d;
            --paper: #f9f4e8;
            --tape: rgba(255, 255, 255, 0.2);
            --accent: #d4a373;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 30px 30px; /* ডটেড ব্যাকগ্রাউন্ড */
            margin: 0;
            padding: 50px 20px;
            font-family: 'Courier New', Courier, monospace; /* টাইপরাইটার ফন্ট */
            color: var(--paper);
        }

        .main-header {
            text-align: center;
            margin-bottom: 80px;
        }

        .main-header h1 {
            font-size: 3.5rem;
            text-transform: lowercase;
            border-bottom: 2px dashed var(--accent);
            display: inline-block;
            padding-bottom: 10px;
        }

        /* Polaroid Gallery Layout */
        .gallery-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Polaroid Card */
        .polaroid {
            background: var(--paper);
            padding: 15px 15px 60px 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            cursor: pointer;
            width: 280px;
        }

        /* এলোমেলো অ্যাঙ্গেলে ছবি সাজানো (নতুনত্ব) */
        .polaroid:nth-child(even) { transform: rotate(3deg); }
        .polaroid:nth-child(odd) { transform: rotate(-3deg); }
        .polaroid:nth-child(3n) { transform: rotate(5deg); }

        /* হোভার করলে ছবি সোজা হয়ে সামনে আসবে */
        .polaroid:hover {
            transform: rotate(0deg) scale(1.1) translateY(-20px);
            z-index: 100;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .polaroid img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            filter: sepia(30%) contrast(1.1); /* পুরনো লুক */
        }

        /* স্টিকি টেপ ইফেক্ট (নতুনত্ব) */
        .polaroid::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 30px;
            background: var(--tape);
            backdrop-filter: blur(2px);
        }

        .caption {
            position: absolute;
            bottom: 15px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #333;
            font-weight: bold;
            font-size: 1rem;
            padding: 0 10px;
            box-sizing: border-box;
        }

        /* Floating Animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .polaroid {
            animation: float 6s ease-in-out infinite;
        }

        footer {
            text-align: center;
            margin-top: 100px;
            font-size: 0.8rem;
            opacity: 0.5;
            letter-spacing: 5px;
        }

        @media (max-width: 600px) {
            .polaroid { width: 90%; transform: rotate(0deg) !important; }
        }
    </style>
</head>
<body>

    <div class="main-header">
        <h1>collected_moments</h1>
    </div>

    <div class="gallery-container">
        
        <div class="polaroid">
            <img src="memory1.jpg" alt="Tour">
            <p class="caption">study tour '24</p>
        </div>

        <div class="polaroid">
            <img src="memory2.jpg" alt="Friends">
            <p class="caption">old school, old vibes</p>
        </div>

        <div class="polaroid">
            <img src="memory3.jpg" alt="High School">
            <p class="caption">last day at school</p>
        </div>

        <div class="polaroid">
            <img src="memory4.jpg" alt="Eid">
            <p class="caption">eid ul fitr '25</p>
        </div>

        <div class="polaroid">
            <img src="memory5.jpg" alt="Break">
            <p class="caption">quiet moments</p>
        </div>

        <div class="polaroid">
            <img src="memory6.jpg" alt="Awesome">
            <p class="caption">it was awesome!</p>
        </div>

        <div class="polaroid">
            <img src="memory7.jpg" alt="Result">
            <p class="caption">victory day '23</p>
        </div>

        <div class="polaroid">
            <img src="memory8.jpg" alt="Class Party">
            <p class="caption">good times 🥹</p>
        </div>

    </div>

    <footer>
        EOF: END OF FILE
    </footer>

</body>
</html>
