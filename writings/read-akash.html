<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আকাশ ভরা তারা | পড়া শুরু করুন</title>
    <style>
        :root {
            --paper: #f4ece4; 
            --ink: #2c2420;
            --accent: #b0413e;
            --border: rgba(176, 65, 62, 0.2);
        }

        body {
            font-family: 'Times New Roman', 'AdorshoLipi', serif;
            background-color: #dfd3c3; 
            color: var(--ink);
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .reader-container {
            max-width: 800px;
            width: 100%;
            background-color: var(--paper);
            min-height: 100vh;
            padding: 60px 80px;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
            position: relative;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        .back-link {
            text-decoration: none;
            color: var(--accent);
            font-weight: bold;
        }

        .book-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .book-title {
            font-size: 3rem;
            margin: 0;
            color: var(--accent);
        }

        /* Reading Area */
        #novel-content {
            font-size: 1.3rem;
            line-height: 2.2;
            text-align: justify;
            white-space: pre-wrap; /* টেক্সটের ফরম্যাট ঠিক রাখবে */
        }

        /* Scroll Progress Bar */
        .progress-bar {
            position: fixed;
            top: 0; left: 0; height: 5px;
            background: var(--accent);
            width: 0%;
            z-index: 1000;
            transition: width 0.2s ease;
        }

        footer {
            margin-top: 100px;
            text-align: center;
            padding: 40px;
            border-top: 1px solid var(--border);
            color: #888;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .reader-container { padding: 40px 20px; }
            .book-title { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="progress-bar" id="progressBar"></div>

    <div class="reader-container">
        <div class="top-nav">
            <a href="writings.html" class="back-link">← লাইব্রেরি</a>
            <span id="reading-status" style="color: #999; font-size: 0.9rem;">পড়ছেন...</span>
        </div>

        <div class="book-header">
            <h1 class="book-title">আকাশ ভরা তারা</h1>
            <p style="color: #777;">সম্পূর্ণ উপন্যাস</p>
        </div>

        <div id="novel-content"></div>

        <footer>
            সমাপ্ত। পড়ার জন্য ধন্যবাদ।
        </footer>
    </div>

    <script>
        // স্ক্রল প্রগ্রেস লজিক
        window.onscroll = function() {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (winScroll / height) * 100;
            document.getElementById("progressBar").style.width = scrolled + "%";
            
            if(scrolled > 95) {
                document.getElementById("reading-status").innerText = "শেষের পথে";
            } else {
                document.getElementById("reading-status").innerText = "পড়ছেন...";
            }
        };

        // উপন্যাস লোড করার ফাংশন
        function displayNovel() {
            document.getElementById('novel-content').innerText = novelData;
        }

        // পেজ লোড হলে ফাংশনটি রান করবে
        window.onload = displayNovel;

        // --- উপন্যাসটি নিচে দেওয়া হলো ---
        // ব্যাকটিক (`) চিহ্নের ভেতরে তোমার পুরো উপন্যাসটি পেস্ট করো
        const novelData = `

১. জন্মদিন

ছবি আকা শেষ করলাম । এই ছবিটা অবশ্য যেমন চেয়েছিলাম তেমন হয়নি । তারাতারি একেছি । তারাতারি করা কোনো কাজই সম্ভবত ভালো হয়না । তবে মা খুব তারাতারি কাজ করতে পছন্দ করতেন । কেন করতেন কে জানে । তার সব কাজেই ছিলো তারাহুরা।  তা সে যে কাজই হোক না কেন। দুপুরে গোসল করার সময় হলে তার মাথা ঠিক থকতো না । গোসল কর , গোসল কর বলে চেচাতেই থাকতেন। যদি বলতাম দশ মিনিট পর গোসল এ যাচ্ছি তখন মা ২ মিনিট বিরতি দিয়ে আবার চিল্লানো শুরু করতেন। পেন্সিল গুলো গুছিয়ে রাখলাম। ছবি আকার সময় পেন্সিলগুলো টেবিল জুরে ছড়িয়ে ছিটিয়ে থাকে। রাকিবদের বাসায় যেতে হবে রিকশা করে । আকাশে মেঘ করেছে । বৃষ্টি না এলেই হয়। হেটেই যেতাম কিন্তু আকাশের যা অবস্থা মনে হচ্ছে হেটে যাওয়া যাবেনা। তার উপর জন্মদিনের অনুষ্ঠান বলে কথা , দেরি করা ঠিক হবেনা । প্রথমে ভেবেছিলাম প্যাডেলওয়ালা রিকশায় চরে ভুল করেছি । এখন তা মনে হচ্ছেনা । মোটর লাগানো রিকশার চে দ্রুত যাচ্ছে । তবে রিকশাভারা নিয়ে ঝামেলা করবে বলে মনে হচ্ছে। সব ভালো জিনিসের একটা খারাপ দিক থাকে। ওনাকে দেখেও তাই মনে হচ্ছে। ভারা জিজ্ঞেস করতেই বললো "আরে মামা ওঠেন তো , ভারা নিয়া ঝামেলা হইবো না।" শুরুতে প্রায় সব রিকশাওয়ালা এরকম বললেও নামার সময় ঝামেলা করে। একবার মায়ের ওষুধ কিনে বাসায় ফিরছি। রিকশা থেকে নেমে ভারা দিতেই রিকশাওয়ালা বললো,

-এইডা আপনে কি দিলেন ?
-কেন ভারা দিলাম।
-৩০ টেকার ভারা ২০ টাকা দেন কিজন্নে?
-বলেন কি। প্রতিদিন যাই ২০ টাকা আজ হঠাত ৩০ টাকা হয়ে গেল? আর তাছারা আমি তো আপনাকে বলেই উঠলাম ২০ টাকা দিবো।
-২০ টেকা কহন বললেন, কানে কি কম হুনি? গরিবের কথার তো দাম নাই। থাক ভারা লাগবো না। যানগা। 

কথা আর বারালাম না। ৩০ টাকা বাড়িয়ে দিলাম। রিকশাওয়ালা অন্য দিকে ঘার ঘুরিয়ে ভারা নিলো। এবার অবশ্য ঝামেলা তেমন হলোনা। ভারা দেওয়ার পর টাকাটা কিছুক্ষণ আকাশের দিকে ধরে রেখে তারপর পকেটে ভরে রিকশা নিয়ে চলে গেল। প্রতিবারের মত এবারও রাকিবদের বাড়ি দেখে বিয়ে বাড়ি মনে হচ্ছে। একটা জন্ম দিনের অনুষ্ঠন এ যে পুরো বাড়ি এভাবে সাজানো হবে ভাবাই যায়না। রাকিবের বাবা আহসান সাহেব যেকোনো অনুষ্ঠান এর সময় মদ্যপান করবেন। দুই এক পেগ পেটে পরলে তিনি ইংরেজী বলতে শুরু করেন। পুরোপুরি ইংরেজী না। ইংরেজী ও বাংলার খিচুরি বলা যেতে পারে। সব সময় অবশ্য গ্রামার ঠিক থাকেনা। রকিবের বোন আহনার বিয়ের সময় তিনি মদ্যপান করতে করতে আমাকে বললেন,

-শোন ইমন, নবিজি বলেছেন যে বিয়েতে খরচ যত কম, সে বিয়েতে বরকত তত বেশি। তাই আমি বেশি খরচ করতে চাইনা। তুমি কি বলো? 
-জি চাচা। বেশি খরচ করা ঠিক হবেনা।
-তাই আমি সিদ্ধান্ত নিয়েছি বিয়ের খরচ ৭ লক্ষ টাকার বেশি হবেনা। Very little amount of money.
- ও আচ্ছা।
-বলতো ৭ লক্ষ টাকা কেন?
-জানিনা।
-কারণ আমাদের ধর্মে ৭ সংখ্যাকে বিশেষ গুরুত্ব দেওয়া হয়েছে। আসমান ও জমিন ৭ টি। আবার জাহান্নামের দরজা ৭ টি।

জাহান্নামের দরজার সাথে বিয়ের টাকার কি সম্পর্ক বোঝা গেল না। মদ খেলে মনে হয় লজিক উলটে যায়। এবার মনে হয় না এমন হবে। কারণ আহসান সাহেব বাসায় নেই। তিনি কি একটা ব্যাবসার কাজে সিংগাপুর গিয়েছেন। রাকিবদের বাসার দারোয়ান মনে হয় আমাক পছন্দ করেনা। আমি যে এই বাড়িতে নতুন আসি তা না। প্রায় ২ বছর যাবত যাওয়া আসা করি। তবে দারোয়ান আমার দিকে এমন ভাবে তাকায় মনে হয় প্রথমবার বড় কোনো আসামিকে সরাসরি দেখছে। আমার অনেক্ষণ ধাক্কাধাক্কি করার পর মেইন গেট খুলে। আজ অবশ্য ধাক্কা ধাক্কি করতে হয়নি। গেট খোলাই ছিলো। বাড়ির নাম সপ্ননীড়। এই নামের পেছনে কারন থাকতে পারে। আহসান সাহেব কারণ ছাড়া কোন কাজ করবেন বলে মনে হয়না। রাকিবদের বাড়ি কোনো রাজপ্রাসাদেরচে কম না। শহরের মধ্যে এমন বাড়ি থাকতে পারে কে বলবে। মূল ভবন তিন তলা। সাদা রঙ এর দেয়ালে হালকা সোনালি কারুকাজ। বড় বড় কাচের জানালা। উপরে আছে লাইব্রেরি। যেখান থেকে আমি মাঝে মাঝে বই নিয়ে যাই। কিছুদিন আগে একটা বই নিয়েছিলাম এখনো ফেরত দেওয়া হয়নি। বই এর নাম crime and punishment. তবে এত সুন্দর বাড়ি কিন্তু তা লোকচক্ষুর আড়ালে। বাইরে থেকে বোঝাই যায়না ভেতরে এত সুন্দর বাড়ি আছে। সুন্দর জিনিস থাকবে চোখের সামনে। আড়ালে না। ভেবেছিলাম সবাই চলে এসেছে। গিয়ে দেখি আমি এ প্রথম। আসার মধ্যে শুধু রকিব এর খালা এসেছেন। রাকিব এর খালা আর রাকিব এর মা কথা বলছেন। রাকিব আলস ভংগিতে সোফায় বসে মুখের কাছে খবরের কাগজ নিয়ে বসে আছে। খবর পড়ছে বলে মনে হচ্ছেনা। সিরিয়স ধরনের ভাব আনার চেষ্টা। এই বয়সে ছেলেরা নিজেদের মধ্যে সিরিয়াস ভাব আনতে পছন্দ করে।কিছুদিন আগে রাকিবের একটা বিয়ে ভেঙে যাওয়ার পর থেকেই অবশ্য সিরিয়াস হয়ে গেছে। 
রাকিব আমাকেই দেখেই বললোঃ

- আরে বেটা ছিলি কোথায়? তোকে না বললাম আগে আগে আসবি?

- আগেই তো এলাম, কেউ তো এখনো আসেনি। শুধু আমি এসেছি।

-তোকে বলেছিলাম সন্ধ্যা সাত টায় উপস্থিত থাকবি। এখন কয়টা বাজে?

-ছবির কাজটা একটু বাকি ছিলো। কিছু মনে করিসনা।

-আরে না না । মনে করবো কি। তুই ফরমালিটি বাদ দিবি? কই দেখি ছবিটা দে।

এতক্ষন যাকে খুবই সিরিয়াস বলে মনে হচ্ছিলো এখন তাকে মোটেই তেমন লাগছে না। মনে হচ্ছে খুবই সরল আর মিশুক ধরনের মানুষ। আমি ছবিটা ওকে দিলাম। রাকিব বললঃ

-আরে বাহ! ব্রিলিয়ান্ট। স্কেচটাতো খুবি সুন্দর। আমি যে দেখতে এত সুন্দর এই ছবি না দেখলে তো বুঝতেই পারতাম না।
কিছুক্ষণের মধ্যেই সবাই চলে এল। কেক কাটা পর্ব শেষ। ভদ্রভাবেই শেষ হল। কেক নিয়ে মাখামাখি টাইপ কিছু হলোনা। বড়লোকরা বোধ হয় একে অভদ্রতা মনে করে। রকিব এর খালার নাম রোকসানা বেগম। তিনি রকিব এর গ্রাজুয়েশন শেষ হবার পর থেকে রকিব এর বিয়ের জন্য মেয়ে দেখে যাচ্ছেন। কোনো একটা কারণে, রকিব এর বিয়ে দেওয়া তিনি তার পবিত্র কর্তব্য বলে মনে করছেন। অবশ্য তার কোনো সন্তান নেই এটাও একটা কারণ হতে পারে।সব শেষ যে বিয়ের কথা হয়েছে সেই মেয়ের নাম ইশিতা। মেয়ে ঢাকা বিশ্ববিদ্যালয়ে ইংরেজী সাহিত্বে অনার্স করছে। রাকিব এর খালার মতে এর চে ভালো মেয়ে রাকিব আর পাবেনা। মেয়ের বাবা আর্মি অফিসার এবং মা গৃহিনী। রাকিব এর বিয়ে হব হব করছে কিন্তু হচ্ছেনা। মাস কয়েক আগে একটা মেয়ের সাথে কথা হচ্ছিলো নাম সুরাইয়া। সুরাইয়াদের আর্থিক অবস্থা তেমন ভালো না হলেও চলার মত। কিন্তু মেয়ে দেখতে ছিলো অনেক সুন্দরী। রাকিব প্রথম দেখেই মেয়েটিকে পছন্দ করে। বিয়ের কথা ভালই আগাচ্ছিলো। রাকিব মাস দুইয়ের মত সুরাইয়ার সাথে কথা বলে। রাকিব এর সাথে মেয়েটির প্রেম প্রেম ভাব শুরু হয়েছিলো কেবল। হঠাত কোথা থেকে যেনো সুরাইয়ার পূর্ব পরিচিত প্রেমিকের আবির্ভাব ঘটে। সুরাইয়া রাকিবকে ফোন দিয়ে বলে , 

-রাকিব তোমাকে একটা কথা বলবো। আমার একটু সাহায্য প্রয়োজন।

-হ্যা বলো কি সাহয্য? 

-তোমাকে কিভাবে বলবো বুঝতে পারছিনা, আবার না বলেও থাকতে পারছিনা, তোমাকে ছাড়া আর কাকে বলব।

-সেকি , তুমি বলো । কোনো সমস্যা নেই। 

-আমার এক বান্ধবি তার বাবার বাড়ি থেকে পালিয়ে এসেছে তার প্রেমিকের সাথে। বাসা থেকে কিছু গয়না আর কিছু ক্যাশ টাকা নিয়ে এসেছে। তার প্রেমিক টাকা নিয়ে পালিয়ে গেছে।
-বলকি, এখন কি অবস্থা তোমার বান্ধবির ? 

-অবস্থা ভালোনা । আমি ওকে আমার বাসায় দুই দিনের জন্য রেখেছি । বাবকে বলেছি আমার বান্ধবি , বেড়াতে এসেছে । দুই দিন থেকে চলে যাবে । 

-আমাকে কি করতে হবে ?

-তোমাকে যা করতে হবে তা হলো ওর গয়না গুলো তোমার কাছে দুই দিন রাখতে হবে কারণ আমার বাসায় দেখলে ঝামেলা হবে । দুই দিন পর ও যখন চলে যাবে তখন আমি তোমার কাছে থেকে নিয়ে নিব।

-এটা কোনো ব্যাপার হলো? 

দুই দিন পর সুরাইয়া রাকিবের কাছ থেকে গয়না নিয়ে নিজের প্রেমিকের সাথে পালিয়ে যায়। পরে জানা যায় গয়না গুলো সুরাইয়া নিজের বাসা থেকে চুরি করেছিল। বান্ধবির পুরো কথাটা বানানো। সুরাইয়ার পরিবার বিয়ের জন্য চাপ দিচ্ছিলো, তাই ও রাজি হবার কথা বলে সময় নিয়েছিলো। সময়ত প্রেমিকের সাথে পলায়ন। রাকিব দুই মাস ঘোর এর মধ্যে ছিলো। হঠাত একদিন আমার সাথে দেখা করে বলে,

-বুঝলি, আমি ভেবেছলাম মেয়েটি সবার চে আলাদা । এখন দেখি তা না। 

আমি বললাম,

-মেয়েটি তো আসলেই আলাদা। এক কথায় বলতে গেলে অসাধারণ।

-কিভাবে ?

-সাধারণ মেয়েরা প্রেমিককে ভুলে হাসিমুখে বিয়ে করে ফেলে, গয়না নিয়ে পালিয়ে যায় না।

রাকিব কিছু বলেনি তখন। মনে হয় কি বলবে বুঝতে পারছিলো না। তবে এখন যে মেয়ের সাথে বিয়ের কথাবার্তা চলছে, এই বিয়েটা মনে হয় হয়েই যাবে। রাকিব মেয়েটিকে নিজে নিজে কল দিচ্ছে না। তেমন আগ্রহও দেখাচ্ছে না। কিন্তু রাকিবের খালার কাছে শোনা যাচ্ছে মেয়ের নাকি রাকিবকে বিয়ে করার ব্যাপারে সম্মতি আছে। প্রেম ও বিয়ের ক্ষেত্রে যেকোনো দুইজন এর একজন যতটাই আগ্রহ দেখায় , অপরজন ঠিক ততটাই অনাগ্রহ দেখায়। রাকিব আগ্রহ দেখাচ্ছে না। কাজেই ইশিতা আগ্রহ দেখাচ্ছে। আমরা যা পাইনা তার প্রতি আমাদের আগ্রহের শেষ থাকেনা। মানুষ যা পেয়ে যায় তার পিছনে ছোটে না। চাঁদকে আমরা ছুতে পারিনা বলেই চাঁদ এর প্রতি আমাদের এত ভালোবাসা। এত আগ্রহ। কবিরা একে নিয়ে কবিতা লেখেন, শিল্পীরা ছবি আকেন। জন্মদিনের অনুষ্ঠান শেষের দিকে। 


অনুষ্ঠান শেষ ই বলা যায়। শুধু আমরা তিনজন বন্ধু এবং রাকিব এর খালা আছি। কিছুক্ষণ আগে আবার রাকিবের বোন অহনা এসেছে। অহনা আসতে দেরি করেছে। আমি রাকিব ও নিলয় বসে আছি রাকিব এর রুমে । নিলয় অনেকটা জোকার টাইপ। মনে হয় মানুষকে হাসানো নিজের দায়িত্ব বলে মনে করে। সব সময় উল্টাপালটা কথা বলে , লজিক ছাড়া। রাত ১০ টার কাছাকাছি। ঘরিতে সময় দেখলাম। ঘরির দিকে তাকিয়ে থাকতে ভালো লাগছে। সাধারণ দেয়াল ঘরির মত না। ঘরির কাটা সুষম বেগে ঘুরছে। থামছে না। এমন বেগে ঘুরছে যেন ঠিক ৬০ সেকেন্ড পর ৩৬০ ডিগ্রি ঘুরে আসে। নিলয় বললো,

-কিরে কাটা ঘরির টাইম বুঝতে পারছিস না?

-আরেনা তা না।

এমন সময় রাকিবদের কাজের মেয়ে ঘরে ঢুকে বলল, “আম্মাজি আপনাদের খাইতে ডাকছেন।” রাকিব বললো,

-চল খেয়ে আসি।

২. কথা ছিলো হেটে যাওয়া হবে
আমি আর নিলয় পথ ধরে হাটছি। নিলয় তার অভ্যাস মত কথা বলে যাচ্ছে। কোনো ছেলে মানুষ যে এত কথা বলতে পারে তা নিলয়কে না দেখলে বোঝা যাবেনা। সবাই তাকে ভ্যাগাবন্ড নামে চেনে। অসহ্য। রাতে রাকিব এর বাসায় খাওয়া হয়নি। না খেয়ে আসাটা ভুল হয়েছে বাসায় যেতে কম করে হলেও ১ ঘন্টা লাগবে। এত সময় লাগার কথা ছিলো না। নিলয় বাসার দিকে না এসে উলটো দিকে নিয়ে এসেছে । তাও রিকশা করে। মানুষ খাল কেটে কুমির আনে। নিলয় এর সাথে থাকা মানে কুমির চাষ করা। আসার সময় কোনো রিকশা পাওয়া যাচ্ছিলো না। অনেকক্ষণ দারিয়ে থাকার পর একটা রিকশা পাওয়া গিয়েছিলো।  নিলয় কোনো কথা না বলে রিকশায় উঠে গেলো। আমাকেও রিকশায় উঠতে হলো। নিলয় আমাকে ইশারা দিয়ে বলল, কিছু না বলতে। আমি অবাক হয়ে খেয়াল করলাম রিকশাওয়ালা যানতে চাচ্ছে না আমরা কোথায় যাব। তিনি রিকশা চালিয়ে যাচ্ছেন। মিনিত ১৫ এর মত ঝরের বেগে রিকশা চালানোর পর হঠাত থামিয়ে বললো আইসা গেছি। নিলয় আমাকে নিয়ে প্রায় লাফিয়ে রিকশা থেকে নামলো। আমাকে বললো, চল যাই। এই বলে ভারা না দিয়েই মাঠের দিকে হাটা ধরলো। রিকশাওয়ালা ডাক দিয়ে বললো, মামা ভারা দিবেন না ? নিলয় আর রিকশাওয়ার কথপথন নিম্নরূপঃ

-মামা ভারা দিবেন না ?

-ভারা দিবোনা কেন? ভারা অবশ্যই দিব। এই নেন। 

-২৫ টাকা দেন কেন? 

-ভারা ২৫ টাকা তাই ২৫ টাকা দেই।

-ভারা তো ৫০ টাকা হইছে।

-কিভাবে ৫০ টাকা?

- সেইখানে থেকে চন্দ্রিমা উদ্দান, ৫০ টাকা কমই চাইছি।

- কেন শাহাবাগ থেকে আমার বাসা ১০ টাকা, around zero pint five kilometer. আমরা এসেছি, দের কিলো এর কম হবে। ধরে নিচ্ছি দের কিলোমিটার। যার মানে, ten devided by zero point five times one point five. তাহলে হয় ৩০ টাকা।

- আমার লগে ইংরেজী চটকাবেন না। এরম ইংলিশ বহুত দেখছি।

- আমাকে রাগাবেন না। বুঝলেন।

-কি করবেন হুনি রাগাইলে?

-ভারা দিবো না। আরকি।

-নিলাম না আপনের ভারা, আপনের ভারা না নিলে কি হয়? আমার বাল হয়।

নিলয় নির্বিকার ভঙ্গিতে চন্দ্রিমা উদ্দান এর দিকে হাটা দিলো। আমার কাছে টাকা নেই। কাজেই আমিও ওর পিছে পিছে হাটা দিলাম। বললাম , কিরে ওনাকে ভারা দিবিনা?
না দিবোনা।
ওনার সাথে এমন কেন করলি?
বিনোদোন নিলাম বুঝলি। নিজের খুশি নিজেকেই রাখতে হবে।

আমি কিছু বলাম না। নিলয় বললো এখানে একটু দারা একটা সিগারেট খেয়ে নেই। নিলয় পকেট থেকে লাইটার বের করতে করতে বললো, বলল
রিকশাওয়ালা আমদের এখানে কেন নিয়ে এলো বলত?
কেন?
রাতের শহর আর দিনের শহর এক না। তাই।
তোর বকবক শুনতে ভালো লাগছে না। এত রাতে বাসায় যাব কিভাবে?
সবই আল্লার ইচ্ছা রে ভাই। মানুষের কিছু করার নাই। 

এমন সময় একটি মেয়ে আমাদের কাছে এসে বললো, স্যার যাইবেন? রেট কমাই রাখমু। আমি বললাম, কোথায় যাব? মেয়েটি কিছু বললো না। নিলয় বলল, রেট কম কেন রে , কাষ্টমার কম? মেয়েটি বলল, যাইবেন কিনা তাই কন। আমার মাথা চক্কর দিয়ে উঠল। এখন বুঝতে পারছি ব্যাপারটা কি। আমি নিলয় কে বললাম বাসায় চল অনেক রাত হয়েছে। বাসায় যেতে হবে। নিলয় বলল, আরে এত ভয় পাচ্ছিস কেন, আমরা তো সত্যি সত্যি কোনো মেয়েকে বাসায় নিয়ে যাচ্ছিনা। দারা সিগারেটটা শেষ করে নেই। নিলয় মেয়েটিকে বলল,
নাম কি ?
বিউটি।
আসল নাম কি?
চিত্রা।
বাহ নামত সুন্দর। এখন থাক। আসি, তোর সাথে কথা হয়ে ভালো লাগলো।

সিগারেট এ লম্বা করে টান দিয়ে ফেলে দিয়ে বাইরের দিকে হাটা শুরু করল, মেয়েটি এখনো আমাদের দিকে তাকিয়ে আছে।নিলয়ের সাথে আমিও হাটা শুরু করেছি। তখন থেকে হাটছি। নিলয় এর সাথে এসে বপদ হয়েছে। ওর কাজের কোনো ঠিক নেই। সব বিষয় নিয়ে ফাজলামি করবে। আকাশে মেঘ এখনো আছে। তারা দেখা যাচ্ছে না। নিলয় বলল, মায়ার কি খবর? তোর প্রিয়তমার কথা বলছি। আমি বলমা, কোনো খবর নেই। নিলয় বললো, খবর এর বাংলা প্রতিশব্দ বলত? খবর এর বাংলা প্রতিশব্দ হচ্ছে অখবড়া, বাণী, জানানি। এমন সময় আকাশে বিকট শব্দ হলো বাজ পরার। নিলয় বলল, আলোর চে শব্দ ধীরে চলে। কিন্তু মহাবিশ্বের শুরু শব্দ দিয়ে, বিগ ব্যাং। প্রচন্ড শব্দ। আমি বললাম, তুই থামবি এবার? নিলয় বলল, এইজে তুই থামব বলে চিতকার করলি, বিগ ব্যাং করলি। আমি কিছু বললাম না। ওকে বলেই লাভ নেই। আকাশে মেধ আরো বেরেছে। একটু পর পর শব্দ হচ্ছে। আকাশে কোনো তারা নেই। চাঁদও নেই। এমন অবস্থায় নিলয় বলল, থাক আমি যাই। এই বলে অন্য পথে হাটা শুরু করল। আমি ওকে কিছু জিজ্ঞেস করলাম না। আপদ বিদায় হয়েছে এটাই অনেক।

হাটছি আধা ঘন্টার বেশি, প্রবল বাতাস বইতে শুরু করেছে। হার হিম হয়ে আসছে। গায়ের সব লোম দারিয়ে যাচ্ছে। গরম কাপড় তেমন পরিনি। অনেক জোরে বৃষ্টি হবে এতে কোনো সন্দেহ নেই। নির্ঘাত ভিজতে হবে। হোক তাও ভালো। অনেকদিন পর বৃষ্টিতে ভেজা হবে। বেলি ফুলের গন্ধ কোথা থেকে আসছে বোঝা যাচ্ছে না। পাশেই একটা লোক দোকান বন্ধ করছে। সামনে ফুল ঝোলানো দেখে বুঝলাম এটা ফুলের দোকান আর এখানে থেকেই গন্ধ আসছে? আমি হাটার গতি বারিয়ে দিলাম। সঙ্গে সঙ্গেই শুরু হলো ভারি বর্ষণ। আমি ভিজতে ভিজতে আগাচ্ছি। হঠাত করে খেয়াল করলাম আমার বিষন্ন লাগছে। কেন লাগছে কে জানে? মায়ার কথা মনে পড়ায় মন খারাপ হতে পারে। মায়ার সাথে অবশ্যা আমার তেমন কোনো দুঃখের সৃতি নেই। সবই আনন্দের সৃতি। তাহলে কষ্ট লাগছে কেন? সুখের সৃতি মনে করেও কি মানুষ কষ্ট পায়? কেষ্ট কেন? মায়াকে পাবোনা তাই? 

লেখকের কথাঃ প্রিয় বন্ধুরা, এই উপন্যাসটি এখনো লেখা শেষ করিনি, লেখা হলে আপনাদের জন্য তা উন্মুক্ত করা হবে। 
_জুবায়ের তালুকদার ২২ এপ্রিল ২০২৬, কোনাবাড়ী গাজীপুর।
